precedes_mother_takes", "relation": "precedes", "source": "cat_finds_notebook", "target": "mother_takes_notebook", "time_end_event": null, "time_start_event": null, "weight": 1.0}}, "from": "cat_finds_notebook", "to": "mother_takes_notebook"}, {"arrows": "to", "data": {"data": {"chunk_id": 1, "description": "Mother takes the notebook after it is found.", "id": "mother_takes_notebook_takes_notebook", "relation": "takes", "source": "mother_takes_notebook", "target": "notebook", "time_end_event": null, "time_start_event": "Mother takes notebook", "weight": 1.0}}, "from": "mother_takes_notebook", "to": "notebook"}, {"arrows": "to", "data": {"data": {"chunk_id": 1, "description": "Mother takes the notebook from under the bed.", "id": "mother_takes_notebook_occurs_near_bed", "relation": "occurs near", "source": "mother_takes_notebook", "target": "bed", "time_end_event": null, "time_start_event": "Mother takes notebook", "weight": 1.0}}, "from": "mother_takes_notebook", "to": "bed"}, {"arrows": "to", "data": {"data": {"chunk_id": 1, "description": "After taking the notebook, the mother begins telling the story.", "id": "mother_takes_precedes_story", "relation": "precedes", "source": "mother_takes_notebook", "target": "story_about_cat", "time_end_event": null, "time_start_event": null, "weight": 1.0}}, "from": "mother_takes_notebook", "to": "story_about_cat"}, {"arrows": "to", "data": {"data": {"chunk_id": 1, "description": "The conversation centers around the cat being addressed as a demon who used to be a rock.", "id": "conversation_about_cat_about_cat", "relation": "is about", "source": "conversation_about_cat", "target": "cat", "time_end_event": null, "time_start_event": "Conversation about cat", "weight": 1.0}}, "from": "conversation_about_cat", "to": "cat"}]);

            <style>
            #infoPanel {
                position: fixed;
                top: 20px;
                right: 20px;
                max-width: 600px;
                background: #1e1e1e;
                color: white;
                padding: 16px;
                border-radius: 8px;
                border: 1px solid #444;
                font-family: Consolas, monospace;
                font-size: 13px;
                display: none;
                z-index: 9999;
                white-space: pre-wrap;
            }
            #infoPanel h3 {
                margin: 0 0 10px 0;
                font-size: 15px;
            }
            </style>
            <div id="infoPanel"></div>
            <script>
            function showPanel(title, data) {
                const panel = document.getElementById("infoPanel");
                panel.style.display = "block";
                panel.innerHTML = "<h3>" + title + "</h3>" +
                                "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
            }

            function hidePanel() {
                document.getElementById("infoPanel").style.display = "none";
            }
            setTimeout(() => {
                if (!window.network) return;
                network.on("click", function (params) {
                    if (params.nodes.length === 0 && params.edges.length === 0) {
                        hidePanel();
                        return;
                    }
                    if (params.nodes.length === 1) {
                        const nodeId = params.nodes[0];
                        const node = network.body.data.nodes.get(nodeId);
                        showPanel("Node: " + nodeId, node.data || {});
                        return;
                    }
                    if (params.edges.length === 1) {
                        const edgeId = params.edges[0];
                        const edge = network.body.data.edges.get(edgeId);
                        showPanel("Edge: " + edge.from + " → " + edge.to, edge.data || {});
                        return;
                    }
                });

            }, 300);
            </script>
